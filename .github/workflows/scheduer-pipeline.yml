name: Master Time Scheduler (Loop Engine)
on:
  workflow_dispatch: # Allows manual activation from the Actions tab panel

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 1440 # Allows the loop to run securely up to 24 hours
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pytz

      - name: Run Master Scheduler Script
        env:
          GH_TOKEN: ${{ secrets.MY_CUSTOM_PAT }} 
          PYTHONUNBUFFERED: "1" # Force Python to stream logs instantly
        run: python -u github-scheduler.py # The -u flag completely disables output buffering
