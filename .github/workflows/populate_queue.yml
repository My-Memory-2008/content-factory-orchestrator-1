name: Populate reel_queue.json from TXT

on:
  schedule:
    - cron: '0 6,17 * * *'
      timezone: 'Asia/Kolkata' # This runs at exactly 6:00 AM IST
  workflow_dispatch:         # Manual trigger

jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Populate reel_queue.json
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone

          SOURCE_FILE = "reels_source.txt"
          QUEUE_FILE = "reel_queue.json"
          PROCESSED_FILE = ".processed_links.txt"  # Hidden tracker file

          # Read source links
          if not os.path.exists(SOURCE_FILE):
              print("❌ reels_source.txt not found"); exit(1)
          
          with open(SOURCE_FILE, "r") as f:
              all_links = [line.strip() for line in f if line.strip()]

          # Read processed links tracker
          processed = set()
          if os.path.exists(PROCESSED_FILE):
              with open(PROCESSED_FILE, "r") as f:
                  processed = set(line.strip() for line in f if line.strip())

          # Find first unprocessed link
          next_link = None
          for link in all_links:
              if link not in processed:
                  next_link = link
                  break

          if not next_link:
              print("✅ All links processed. Queue empty."); exit(0)

          print(f"🎯 Selected: {next_link}")

          # Extract username from URL
          user_match = re.search(r'instagram\.com/([^/?]+)', next_link)
          username = user_match.group(1) if user_match else "unknown"

          # Build queue entry in YOUR exact format
          entry = {
              "url": next_link,
              "username": username,
              "notes": "Auto-added from reels_source.txt",
              "added_at": datetime.now(timezone.utc).isoformat()
          }

          # Default structure if file is missing or empty
          default_queue_data = {
              "queue": [],
              "processed": [],
              "metadata": {
                  "total_queued": 0,
                  "total_processed": 0,
                  "last_run": None,
                  "next_scheduled": None
              }
          }

          # Load or create reel_queue.json
          if os.path.exists(QUEUE_FILE) and os.path.getsize(QUEUE_FILE) > 0:
              with open(QUEUE_FILE, "r") as f:
                  try:
                      queue_data = json.load(f)
                  except json.JSONDecodeError:
                      print(f"⚠️ {QUEUE_FILE} contained invalid JSON. Resetting to default structure.")
                      queue_data = default_queue_data
          else:
              queue_data = default_queue_data

          # Replace queue with new entry (or append if you prefer)
          queue_data["queue"] = [entry]  # Replace with single entry
          # If you want to append instead: queue_data["queue"].append(entry)

          # Update metadata
          queue_data["metadata"]["total_queued"] = len(queue_data["queue"])
          queue_data["metadata"]["last_run"] = datetime.now(timezone.utc).isoformat()

          # Save updated queue
          with open(QUEUE_FILE, "w") as f:
              json.dump(queue_data, f, indent=2)
          print(f"✅ Updated {QUEUE_FILE}")

          # Mark link as processed
          with open(PROCESSED_FILE, "a") as f:
              f.write(f"{next_link}\n")
          print(f"✅ Marked as processed: {next_link}")

          # Git commit & push
          os.system('git config user.name "github-actions[bot]"')
          os.system('git config user.email "github-actions[bot]@users.noreply.github.com"')
          os.system(f'git add {QUEUE_FILE} {PROCESSED_FILE}')
          os.system(f'git commit -m "Auto: queued {username}/{next_link[-12:]}" || echo "No changes"')
          os.system('git push')
          print("✅ Committed & pushed.")
          EOF
