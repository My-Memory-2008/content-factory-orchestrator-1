name: Refresh Kaggle Loop via API

on:
  
  workflow_dispatch: # Manual button to start the loop the first time

jobs:
  refresh-notebook:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install lightweight dependencies
      - name: Install Dependencies
        run: |
         pip install requests openai
         python -m pip install --upgrade pip
         pip install playwright
         playwright install chromium --with-deps

      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_AUTH_JSON: ${{ secrets.KAGGLE_AUTH_JSON }}
        run: python3 trigger-scheduler.py

