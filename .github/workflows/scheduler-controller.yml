name: Refresh Kaggle Loop via API

on:
  repository_dispatch:
    types: [refresh_kaggle_loop] # Triggered automatically by the Kaggle Python script
  workflow_dispatch: # Manual button to start the loop the first time

jobs:
  refresh-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_AUTH_JSON: ${{ secrets.KAGGLE_AUTH_JSON }}
        run: python3 trigger-scheduler.py

