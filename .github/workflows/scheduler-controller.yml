name: Refresh Kaggle Loop via Playwright

on:
  repository_dispatch:
    types: [refresh_kaggle_loop] # Triggered automatically by your Kaggle Python script
  workflow_dispatch: # Gives you a manual button on GitHub to kickstart the system the first time

jobs:
  refresh-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps

      - name: Run Playwright Rerun Automation
        env:
          KAGGLE_USER: ${{ secrets.KAGGLE_USERNAME }} # Save your login email/username in GitHub Secrets
          KAGGLE_PASS: ${{ secrets.KAGGLE_PASSWORD }} # Save your login password in GitHub Secrets
          NOTEBOOK_URL: "https://kaggle.com" # MUST end with /edit
        run: |
          node -e "
          const { chromium } = require('@playwright/test');

          async function run() {
            console.log('Launching Headless Browser...');
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();
            
            console.log('Navigating to Kaggle Security Portal...');
            await page.goto('https://kaggle.com');
            
            console.log('Filling account credentials...');
            await page.fill('input[name=\"username\"]', process.env.KAGGLE_USER);
            await page.fill('input[name=\"password\"]', process.env.KAGGLE_PASS);
            await page.click('button[type=\"submit\"]');
            await page.waitForNavigation({ waitUntil: 'networkidle' });
            
            console.log('Opening Interactive Notebook Workspace Editor...');
            await page.goto(process.env.NOTEBOOK_URL);
            
            console.log('Waiting for the interface layout to initialize...');
            await page.waitForSelector('button:has-text(\"Save Version\")', { timeout: 45000 });
            
            console.log('Clicking \"Save Version\" top action link...');
            await page.click('button:has-text(\"Save Version\")');
            
            console.log('Waiting for Version Overlay Box...');
            await page.waitForSelector('div[role=\"dialog\"]');
            
            console.log('Ensuring \"Save & Run All (Commit)\" selection radio item is active...');
            const commitOption = page.locator('label:has-text(\"Save & Run All (Commit)\")');
            if (await commitOption.isVisible()) {
              await commitOption.click();
            }

            console.log('Clicking the primary Blue \"Save\" action confirmation button...');
            await page.click('div[role=\"dialog\"] >> button:has-text(\"Save\")');
            
            console.log('Success! Kaggle has accepted the automation trigger.');
            console.log('A fresh 7-hour container session is compiling right now.');
            
            await page.waitForTimeout(5000);
            await browser.close();
          }
          run().catch(err => { console.error('Automation Interrupted:', err.message); process.exit(1); });
          "
